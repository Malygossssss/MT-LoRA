    FC2_ENABLED: True
    DOWNSAMPLER_ENABLED: False
    R_PER_TASK:
      semseg: [4]
      normals: [4]
      sal: [4]
      human_parts: [4]
      edge: [4]
      depth: [4]
      shared: [64]
